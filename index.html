<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consciencia Fractal</title>
  <style>
    :root { --bg:#0a0a14; --bg2:#05050c; --gold:#d4a537; --gold-l:#f0cd78; --cream:#f5efe0; --dim:#9a958a; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body {
      background:linear-gradient(160deg,var(--bg),var(--bg2));
      color:var(--cream); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
      min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
      text-align:center; padding:40px 24px; line-height:1.6;
    }
    h1 { font-size:2.4rem; letter-spacing:.06em; color:var(--gold-l); margin-bottom:.4em; font-weight:700; }
    p { color:var(--dim); max-width:520px; margin-bottom:2em; font-size:1.05rem; }
    .links { display:flex; gap:1.2rem; flex-wrap:wrap; justify-content:center; }
    a {
      color:var(--cream); text-decoration:none; border:1px solid var(--gold);
      padding:.7em 1.6em; border-radius:999px; font-size:.95rem; letter-spacing:.04em;
      transition:all .2s ease;
    }
    a:hover { background:var(--gold); color:var(--bg); }
    .mark { font-size:.8rem; color:var(--gold); letter-spacing:.2em; margin-bottom:2.5em; }
  </style>
</head>
<body>
  <div class="mark">&#10022; CONSCIENCIA FRACTAL &#10022;</div>
  <h1>Consciencia Fractal</h1>
  <p>Contenido educativo sobre consciencia, filosof&iacute;a y los patrones que conectan
     la mente con el universo. @consciencia.fractal</p>
  <div class="links">
    <a href="privacy.html">Pol&iacute;tica de Privacidad</a>
    <a href="terms.html">T&eacute;rminos de Servicio</a>
  </div>
</body>
</html>
